
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Account Settings - Accenture')"></head>
<body class="bg-base-200 min-h-screen">
<th:block th:replace="fragments/navbar :: navbar"></th:block>
<div class="container mx-auto flex gap-8 pt-8">
    <aside class="w-64 bg-neutral-900 shadow-xl rounded-2xl p-4 h-fit sticky top-8 self-start text-neutral-100">
        <div class="flex flex-col items-center mb-6">
            <i class="fas fa-university text-primary text-3xl mb-2"></i>
            <span class="font-bold text-xl text-primary">Accenture</span>
        </div>
        <div x-data="{ open: null }" class="space-y-2">
            <div>
                <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 1 ? open = null : open = 1">
                    <i class="fas fa-tachometer-alt mr-3"></i>
                    <span class="flex-1">Dashboard</span>
                    <i class="fas fa-chevron-down transition-transform" :class="open === 1 ? 'rotate-180' : ''"></i>
                </button>
                <div x-show="open === 1" class="pl-8 py-1">
                    <a th:href="@{/dashboard}" class="block py-1 hover:text-primary transition">Overview</a>
                </div>
            </div>
            <div>
                <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 2 ? open = null : open = 2">
                    <i class="fas fa-wallet mr-3"></i>
                    <span class="flex-1">Accounts</span>
                    <i class="fas fa-chevron-down transition-transform" :class="open === 2 ? 'rotate-180' : ''"></i>
                </button>
                <div x-show="open === 2" class="pl-8 py-1">
                    <a th:href="@{/accounts}" class="block py-1 hover:text-primary transition">All Accounts</a>
                    <a th:href="@{/accounts/settings}" class="block py-1 hover:text-primary transition">Settings</a>
                </div>
            </div>
            <div>
                <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 3 ? open = null : open = 3">
                    <i class="fas fa-exchange-alt mr-3"></i>
                    <span class="flex-1">Transactions</span>
                    <i class="fas fa-chevron-down transition-transform" :class="open === 3 ? 'rotate-180' : ''"></i>
                </button>
                <div x-show="open === 3" class="pl-8 py-1">
                    <a th:href="@{/transactions}" class="block py-1 hover:text-primary transition">All Transactions</a>
                </div>
            </div>
            <div>
                <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 4 ? open = null : open = 4">
                    <i class="fas fa-coins mr-3"></i>
                    <span class="flex-1">Currency</span>
                    <i class="fas fa-chevron-down transition-transform" :class="open === 4 ? 'rotate-180' : ''"></i>
                </button>
                <div x-show="open === 4" class="pl-8 py-1">
                    <a th:href="@{/currency}" class="block py-1 hover:text-primary transition">Currency Exchange</a>
                </div>
            </div>
        </div>
        <div class="mt-8 flex flex-col items-center gap-2">
            <span class="font-medium text-neutral-200" th:text="${user.fullName != null ? user.fullName : user.username}">User</span>
            <form th:action="@{/auth/logout}" method="post" class="w-full">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-error btn-sm w-full mt-2"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </form>
        </div>
    </aside>
    <main class="flex-1 p-8">
        <div class="max-w-2xl mx-auto">
            <div class="card bg-base-100 shadow-xl p-8 mb-8">
                <h2 class="text-2xl font-bold mb-6 text-primary">Account Settings</h2>
                <form th:action="@{/accounts/settings}" th:object="${user}" method="post" class="space-y-6 mb-10">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Username:</span>
                        </label>
                        <input type="text" th:field="*{username}" readonly class="input input-bordered bg-base-200 text-base-content/50" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Email:</span>
                        </label>
                        <input type="email" th:field="*{email}" class="input input-bordered" />
                    </div>
                    <div class="form-control flex-row items-center gap-2">
                        <label class="label">
                            <span class="label-text">Dark Theme:</span>
                        </label>
                        <input type="hidden" name="darkTheme" value="false" />
                        <input type="checkbox" name="darkTheme" th:checked="${darkTheme}" value="true" class="toggle toggle-primary" />
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Save Settings</button>
                </form>
            </div>
            <div class="card bg-base-100 shadow-xl p-8">
                <h3 class="text-xl font-semibold mb-4 text-base-content">Change Password</h3>
                <form th:action="@{/accounts/change-password}" method="post" class="space-y-6">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Current Password:</span>
                        </label>
                        <input type="password" name="currentPassword" required class="input input-bordered" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">New Password:</span>
                        </label>
                        <input type="password" name="newPassword" required minlength="6" class="input input-bordered" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Confirm New Password:</span>
                        </label>
                        <input type="password" name="confirmPassword" required minlength="6" class="input input-bordered" />
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Change Password</button>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
