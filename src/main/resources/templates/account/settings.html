
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Account Settings - Accenture')"></head>
<body class="bg-base-200 min-h-screen">
<div class="app-layout">
    <th:block th:replace="fragments/sidebar :: sidebar('settings')"></th:block>
    <main class="main-content">
        <div class="max-w-2xl mx-auto">
                        <!-- Profile Picture Upload Feature -->
                        <div class="card bg-base-100 shadow-xl p-8 mb-8 flex flex-col items-center">
                                <h3 class="text-xl font-semibold mb-4 text-base-content">Profile Picture</h3>
                                <div class="mb-4">
                                        <img id="profile-pic-preview" th:src="${user.profilePicUrl != null ? user.profilePicUrl : '/images/default-profile.png'}" alt="Profile Picture" class="rounded-full w-24 h-24 object-cover border-2 border-primary" />
                                </div>
                                <form th:action="@{/accounts/upload-profile-pic}" method="post" enctype="multipart/form-data" class="flex flex-col items-center gap-2">
                                        <input type="file" name="profilePic" accept="image/*" class="file-input file-input-bordered w-full max-w-xs" onchange="previewProfilePic(event)" />
                                        <button type="submit" class="btn btn-primary">Upload</button>
                                </form>
                                <script>
                                function previewProfilePic(event) {
                                    const [file] = event.target.files;
                                    if (file) {
                                        document.getElementById('profile-pic-preview').src = URL.createObjectURL(file);
                                    }
                                }
                                </script>
                        </div>
            <div class="card bg-base-100 shadow-xl p-8 mb-8">
                <h2 class="text-2xl font-bold mb-6 text-primary">Account Settings</h2>
                <form th:action="@{/accounts/settings}" th:object="${user}" method="post" class="space-y-6 mb-10">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Username:</span>
                        </label>
                        <input type="text" th:field="*{username}" readonly class="input input-bordered bg-base-200 text-base-content/50" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Email:</span>
                        </label>
                        <input type="email" th:field="*{email}" class="input input-bordered" />
                    </div>
                    <div class="form-control flex-row items-center gap-2">
                        <label class="label">
                            <span class="label-text">Dark Theme:</span>
                        </label>
                        <input type="hidden" name="darkTheme" value="false" />
                        <input type="checkbox" name="darkTheme" th:checked="${darkTheme}" value="true" class="toggle toggle-primary" />
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Save Settings</button>
                </form>
                <!-- Random Motivational Quote Feature -->
                <div class="mt-8">
                    <h3 class="text-lg font-semibold mb-2 text-base-content">Need Motivation?</h3>
                    <button class="btn btn-accent mb-2" onclick="showRandomQuote()">Show Random Quote</button>
                    <div id="random-quote" class="italic text-base-content/70"></div>
                </div>
                <script>
                function showRandomQuote() {
                  const quotes = [
                    'Believe you can and you’re halfway there.',
                    'Success is not final, failure is not fatal: It is the courage to continue that counts.',
                    'The only way to do great work is to love what you do.',
                    'You are stronger than you think.',
                    'Dream big and dare to fail.',
                    'Stay positive, work hard, make it happen.'
                  ];
                  const quote = quotes[Math.floor(Math.random() * quotes.length)];
                  document.getElementById('random-quote').innerText = quote;
                }
                </script>
            </div>
            <div class="card bg-base-100 shadow-xl p-8">
                <h3 class="text-xl font-semibold mb-4 text-base-content">Change Password</h3>
                <form th:action="@{/accounts/change-password}" method="post" class="space-y-6">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Current Password:</span>
                        </label>
                        <input type="password" name="currentPassword" required class="input input-bordered" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">New Password:</span>
                        </label>
                        <input type="password" name="newPassword" required minlength="6" class="input input-bordered" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Confirm New Password:</span>
                        </label>
                        <input type="password" name="confirmPassword" required minlength="6" class="input input-bordered" />
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Change Password</button>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
