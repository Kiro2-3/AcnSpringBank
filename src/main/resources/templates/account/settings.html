
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Account Settings - Accenture')"></head>
<body class="bg-base-200 min-h-screen">
<th:block th:replace="fragments/navbar :: navbar"></th:block>
<div class="container mx-auto flex gap-8 pt-8">
    <th:block th:replace="fragments/sidebar :: sidebar('settings')"></th:block>
    <main class="flex-1 p-8">
        <div class="max-w-2xl mx-auto">
            <div class="card bg-base-100 shadow-xl p-8 mb-8">
                <h2 class="text-2xl font-bold mb-6 text-primary">Account Settings</h2>
                <form th:action="@{/accounts/settings}" th:object="${user}" method="post" class="space-y-6 mb-10">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Username:</span>
                        </label>
                        <input type="text" th:field="*{username}" readonly class="input input-bordered bg-base-200 text-base-content/50" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Email:</span>
                        </label>
                        <input type="email" th:field="*{email}" class="input input-bordered" />
                    </div>
                    <div class="form-control flex-row items-center gap-2">
                        <label class="label">
                            <span class="label-text">Dark Theme:</span>
                        </label>
                        <input type="hidden" name="darkTheme" value="false" />
                        <input type="checkbox" name="darkTheme" th:checked="${darkTheme}" value="true" class="toggle toggle-primary" />
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Save Settings</button>
                </form>
            </div>
            <div class="card bg-base-100 shadow-xl p-8">
                <h3 class="text-xl font-semibold mb-4 text-base-content">Change Password</h3>
                <form th:action="@{/accounts/change-password}" method="post" class="space-y-6">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Current Password:</span>
                        </label>
                        <input type="password" name="currentPassword" required class="input input-bordered" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">New Password:</span>
                        </label>
                        <input type="password" name="newPassword" required minlength="6" class="input input-bordered" />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Confirm New Password:</span>
                        </label>
                        <input type="password" name="confirmPassword" required minlength="6" class="input input-bordered" />
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Change Password</button>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
