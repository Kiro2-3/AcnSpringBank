<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Account Settings - Accenture</title>
    <th:block th:replace="fragments/head :: head"></th:block>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/dark-theme.css}" id="dark-theme-css" disabled />
</head>
<body th:classappend="${darkTheme} ? 'dark-theme' : ''" class="bg-gray-100 min-h-screen">
    <th:block th:replace="fragments/navbar :: navbar"></th:block>
    <div class="max-w-2xl mx-auto mt-10 bg-white rounded-xl shadow p-8">
        <h2 class="text-2xl font-bold mb-6 text-indigo-700">Account Settings</h2>
        <form th:action="@{/accounts/settings}" th:object="${user}" method="post" class="space-y-6 mb-10">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Username:</label>
                <input type="text" th:field="*{username}" readonly class="w-full px-4 py-2 border rounded-lg bg-gray-100 text-gray-500" />
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-1">Email:</label>
                <input type="email" th:field="*{email}" class="w-full px-4 py-2 border rounded-lg" />
            </div>
            <div class="flex items-center gap-2">
                <label class="block text-gray-700 font-medium">Dark Theme:</label>
                <input type="hidden" name="darkTheme" value="false" />
                <input type="checkbox" name="darkTheme" th:checked="${darkTheme}" value="true" class="h-5 w-5 text-indigo-600 rounded" />
            </div>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold">Save Settings</button>
        </form>
        <hr class="my-8" />
        <h3 class="text-xl font-semibold mb-4 text-gray-800">Change Password</h3>
        <form th:action="@{/accounts/change-password}" method="post" class="space-y-6">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Current Password:</label>
                <input type="password" name="currentPassword" required class="w-full px-4 py-2 border rounded-lg" />
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-1">New Password:</label>
                <input type="password" name="newPassword" required minlength="6" class="w-full px-4 py-2 border rounded-lg" />
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-1">Confirm New Password:</label>
                <input type="password" name="confirmPassword" required minlength="6" class="w-full px-4 py-2 border rounded-lg" />
            </div>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold">Change Password</button>
        </form>
    </div>
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/account-settings.js}"></script>
</body>
</html>
