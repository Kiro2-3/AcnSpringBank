<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Accounts - Accenture')"></head>
<body class="bg-base-200 min-h-screen">
<th:block th:replace="fragments/navbar :: navbar"></th:block>
<div class="container mx-auto flex gap-8 pt-8">
    <th:block th:replace="fragments/sidebar :: sidebar('accounts')"></th:block>
    <main class="flex-1 p-8">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-3xl font-bold text-base-content">Accounts</h1>
                        <p class="text-base-content/70">Manage your bank accounts</p>
                    </div>
                    <button class="btn btn-primary shadow flex items-center gap-2" onclick="document.getElementById('depositModal').showModal()">
                        <i class="fas fa-plus"></i> New Account
                    </button>
                </div>
                <div th:if="${success}" class="alert alert-success mb-4 flex items-center gap-2">
                    <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-error mb-4 flex items-center gap-2">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                </div>
                <!-- Accounts Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div th:each="account : ${accounts}" class="card bg-base-100 shadow-xl">
                        <div class="card-body gap-4">
                            <div class="flex items-center justify-between">
                                <div class="badge badge-primary" th:text="${account.currency}">USD</div>
                                <span class="badge badge-neutral" th:text="${account.accountType}">SAVINGS</span>
                            </div>
                            <div>
                                <p class="text-xs text-base-content/50">Account Number</p>
                                <p class="text-lg font-mono text-base-content" th:text="${account.accountNumber}">ACC123</p>
                            </div>
                            <div>
                                <span class="text-xs text-base-content/50">Balance</span>
                                <span class="block text-2xl font-bold text-primary" th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' ' + ${account.currency}">0.00 USD</span>
                            </div>
                            <div class="flex justify-end">
                                <a th:href="@{/accounts/{id}(id=${account.id})}" class="btn btn-outline btn-primary btn-sm flex items-center gap-2">
                                    <i class="fas fa-eye"></i> Details
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <!-- DaisyUI Modal for Deposit Funds -->
        <dialog id="depositModal" class="modal">
            <form id="depositForm" method="post" class="modal-box">
                <h3 class="font-bold text-lg mb-4"><i class="fas fa-arrow-down"></i> Deposit Funds</h3>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-control mb-4">
                    <label class="label">Amount</label>
                    <input type="number" name="amount" step="0.01" min="0.01" class="input input-bordered" placeholder="0.00" required>
                </div>
                <div class="form-control mb-4">
                    <label class="label">Description (optional)</label>
                    <input type="text" name="description" class="input input-bordered" placeholder="Deposit description">
                </div>
                <div class="modal-action">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Deposit</button>
                    <button type="button" class="btn" onclick="document.getElementById('depositModal').close()"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </dialog>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function openDepositModal(accountId) {
    document.getElementById('depositForm').action = '/accounts/' + accountId + '/deposit';
    document.getElementById('depositModal').showModal();
}
</script>
</body>
</html>
