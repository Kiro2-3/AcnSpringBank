<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - Accenture</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-base-200 min-h-screen">
<div class="flex">
    <!-- Sidebar and main content already DaisyUI, see below -->
        <body class="bg-base-200 min-h-screen">
        <div class="flex">
            <!-- Sidebar -->
            <nav class="w-64 bg-base-100 shadow-lg min-h-screen flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 px-6 py-6 border-b border-base-300">
                        <i class="fas fa-university text-primary text-2xl"></i>
                        <span class="font-bold text-xl text-primary">Accenture</span>
                    </div>
                    <ul class="mt-6 space-y-2 px-4">
                        <li><a th:href="@{/dashboard}" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-primary/10 text-base-content"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                        <li><a th:href="@{/accounts}" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary/20 text-primary font-semibold"><i class="fas fa-wallet"></i> Accounts</a></li>
                        <li><a th:href="@{/transactions}" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-primary/10 text-base-content"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
                        <li><a th:href="@{/currency}" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-primary/10 text-base-content"><i class="fas fa-coins"></i> Currency</a></li>
                        <li><a th:href="@{/accounts/settings}" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-primary/10 text-base-content"><i class="fas fa-cog"></i> Settings</a></li>
                    </ul>
                </div>
                <div class="px-6 py-4 border-t border-base-300">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fas fa-user-circle text-base-content text-2xl"></i>
                        <span class="font-medium text-base-content" th:text="${user.fullName != null ? user.fullName : user.username}">User</span>
                    </div>
                    <form th:action="@{/auth/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-error btn-block"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </div>
            </nav>
            <main class="flex-1 p-8">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-3xl font-bold text-base-content">Accounts</h1>
                        <p class="text-base-content/70">Manage your bank accounts</p>
                    </div>
                    <button class="btn btn-primary shadow flex items-center gap-2" onclick="document.getElementById('createAccountModal').style.display='flex'">
                        <i class="fas fa-plus"></i> New Account
                    </button>
                </div>
                <div th:if="${success}" class="alert alert-success mb-4 flex items-center gap-2">
                    <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-error mb-4 flex items-center gap-2">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                </div>
                <!-- Accounts Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div th:each="account : ${accounts}" class="card bg-base-100 shadow-xl">
                        <div class="card-body gap-4">
                            <div class="flex items-center justify-between">
                                <div class="badge badge-primary" th:text="${account.currency}">USD</div>
                                <span class="badge badge-neutral" th:text="${account.accountType}">SAVINGS</span>
                            </div>
                            <div>
                                <p class="text-xs text-base-content/50">Account Number</p>
                                <p class="text-lg font-mono text-base-content" th:text="${account.accountNumber}">ACC123</p>
                            </div>
                            <div>
                                <span class="text-xs text-base-content/50">Balance</span>
                                <span class="block text-2xl font-bold text-primary" th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' ' + ${account.currency}">0.00 USD</span>
                            </div>
                            <div class="flex justify-end">
                                <a th:href="@{/accounts/{id}(id=${account.id})}" class="btn btn-outline btn-primary btn-sm flex items-center gap-2">
                                    <i class="fas fa-eye"></i> Details
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <!-- DaisyUI Modal for Deposit Funds -->
        <dialog id="depositModal" class="modal">
            <form id="depositForm" method="post" class="modal-box">
                <h3 class="font-bold text-lg mb-4"><i class="fas fa-arrow-down"></i> Deposit Funds</h3>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-control mb-4">
                    <label class="label">Amount</label>
                    <input type="number" name="amount" step="0.01" min="0.01" class="input input-bordered" placeholder="0.00" required>
                </div>
                <div class="form-control mb-4">
                    <label class="label">Description (optional)</label>
                    <input type="text" name="description" class="input input-bordered" placeholder="Deposit description">
                </div>
                <div class="modal-action">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Deposit</button>
                    <button type="button" class="btn" onclick="document.getElementById('depositModal').close()"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </dialog>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function openDepositModal(accountId) {
    document.getElementById('depositForm').action = '/accounts/' + accountId + '/deposit';
    document.getElementById('depositModal').style.display = 'flex';
}
</script>
</body>
</html>
