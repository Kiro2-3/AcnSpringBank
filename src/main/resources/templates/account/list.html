<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - NeoBank</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-university"></i>
            <span>NeoBank</span>
        </div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/dashboard}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="active"><a th:href="@{/accounts}"><i class="fas fa-wallet"></i> Accounts</a></li>
            <li><a th:href="@{/transactions}"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
            <li><a th:href="@{/currency}"><i class="fas fa-coins"></i> Currency</a></li>
            <li><a th:href="@{/accounts/settings}"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <div>
                    <span class="user-display-name" th:text="${user.fullName != null ? user.fullName : user.username}">User</span>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout-sidebar"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Accounts</h1>
                <p class="page-subtitle">Manage your bank accounts</p>
            </div>
            <button class="btn-primary" onclick="document.getElementById('createAccountModal').style.display='flex'">
                <i class="fas fa-plus"></i> New Account
            </button>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <!-- Accounts Grid -->
        <div class="accounts-grid">
            <div th:each="account : ${accounts}" class="account-card neu-card">
                <div class="account-card-header">
                    <div class="currency-badge" th:text="${account.currency}">USD</div>
                    <span class="account-type-badge"
                          th:text="${account.accountType}">SAVINGS</span>
                </div>
                <div class="account-card-body">
                    <p class="account-number-label">Account Number</p>
                    <p class="account-number-value" th:text="${account.accountNumber}">ACC123</p>
                    <div class="balance-display">
                        <span class="balance-label">Balance</span>
                        <span class="balance-value"
                              th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' ' + ${account.currency}">
                            0.00 USD
                        </span>
                    </div>
                </div>
                <div class="account-card-footer">
                    <a th:href="@{/accounts/{id}(id=${account.id})}" class="btn-secondary btn-sm">
                        <i class="fas fa-eye"></i> Details
                    </a>
                    <button class="btn-primary btn-sm"
                            th:onclick="'openDepositModal(' + ${account.id} + ')'">
                        <i class="fas fa-plus"></i> Deposit
                    </button>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(accounts)}" class="empty-state-card neu-card">
                <i class="fas fa-wallet"></i>
                <h3>No accounts yet</h3>
                <p>Create your first bank account to get started!</p>
                <button class="btn-primary" onclick="document.getElementById('createAccountModal').style.display='flex'">
                    <i class="fas fa-plus"></i> Create Account
                </button>
            </div>
        </div>
    </main>
</div>

<!-- Create Account Modal -->
<div id="createAccountModal" class="modal-overlay" style="display:none;">
    <div class="modal neu-card">
        <div class="modal-header">
            <h2><i class="fas fa-plus-circle"></i> Create New Account</h2>
            <button class="modal-close" onclick="document.getElementById('createAccountModal').style.display='none'">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form th:action="@{/accounts/create}" method="post" class="modal-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Account Type</label>
                <select name="accountType" class="form-control neu-select" required>
                    <option th:each="type : ${accountTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select name="currency" class="form-control neu-select" required>
                    <option th:each="curr : ${supportedCurrencies}" th:value="${curr}" th:text="${curr}"></option>
                </select>
            </div>
            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-check"></i> Create Account
            </button>
        </form>
    </div>
</div>

<!-- Deposit Modal -->
<div id="depositModal" class="modal-overlay" style="display:none;">
    <div class="modal neu-card">
        <div class="modal-header">
            <h2><i class="fas fa-arrow-down"></i> Deposit Funds</h2>
            <button class="modal-close" onclick="document.getElementById('depositModal').style.display='none'">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="depositForm" method="post" class="modal-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" name="amount" step="0.01" min="0.01"
                       class="form-control neu-input" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <input type="text" name="description" class="form-control neu-input"
                       placeholder="Deposit description">
            </div>
            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-check"></i> Deposit
            </button>
        </form>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function openDepositModal(accountId) {
    document.getElementById('depositForm').action = '/accounts/' + accountId + '/deposit';
    document.getElementById('depositModal').style.display = 'flex';
}
</script>
</body>
</html>
