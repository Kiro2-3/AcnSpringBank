<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl p-8">
        <h2 class="text-2xl font-bold mb-6 text-primary">Login</h2>
        <div th:if="${param.error}" class="alert alert-error mb-4">
            <i class="fas fa-exclamation-circle"></i>
            Invalid username or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-success mb-4">
            <i class="fas fa-check-circle"></i>
            You have been logged out successfully.
        </div>
        <div th:if="${success}" class="alert alert-success mb-4">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>
        <form th:action="@{/auth/login}" method="post" class="space-y-6">
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Username:</span>
                </label>
                <input type="text" name="username" required class="input input-bordered" />
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Password:</span>
                </label>
                <input type="password" name="password" required class="input input-bordered" />
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-primary w-full">Login</button>
        </form>
        <p class="mt-4 text-center">Don't have an account? <a th:href="@{/auth/register}" class="link link-primary">Register</a></p>
        <p class="demo-hint mt-2 text-center">
            <i class="fas fa-info-circle"></i>
            Demo: <strong>demo / demo123</strong>
        </p>
    </div>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</body>
