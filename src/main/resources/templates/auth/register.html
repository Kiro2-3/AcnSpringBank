<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NeoBank</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card" style="max-width: 480px;">
        <div class="auth-logo">
            <i class="fas fa-university"></i>
            <h1>NeoBank</h1>
            <p>Create Your Account</p>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/register}" method="post"
              th:object="${registerRequest}" class="auth-form">

            <div class="form-row">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username *</label>
                    <input type="text" id="username" th:field="*{username}"
                           class="form-control neu-input"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                           placeholder="Choose a username" required>
                    <div class="field-error" th:if="${#fields.hasErrors('username')}"
                         th:errors="*{username}"></div>
                </div>

                <div class="form-group">
                    <label for="fullName"><i class="fas fa-id-card"></i> Full Name</label>
                    <input type="text" id="fullName" th:field="*{fullName}"
                           class="form-control neu-input"
                           placeholder="Your full name">
                </div>
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                <input type="email" id="email" th:field="*{email}"
                       class="form-control neu-input"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="your@email.com" required>
                <div class="field-error" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="phoneNumber"><i class="fas fa-phone"></i> Phone Number</label>
                <input type="tel" id="phoneNumber" th:field="*{phoneNumber}"
                       class="form-control neu-input"
                       placeholder="+1-555-0100">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password *</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control neu-input"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           placeholder="Min. 6 characters" required>
                    <div class="field-error" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm *</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                           class="form-control neu-input"
                           placeholder="Repeat password" required>
                </div>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a th:href="@{/auth/login}">Sign in</a></p>
        </div>
    </div>
</div>

</body>
</html>
