<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NeoBank</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl p-8">
        <div class="flex flex-col items-center mb-6">
            <i class="fas fa-university text-3xl text-primary mb-2"></i>
            <h1 class="text-2xl font-bold text-primary">Accenture</h1>
            <p class="text-base-content/70">Create Your Account</p>
        </div>
        <div th:if="${error}" class="alert alert-error mb-4 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>
        <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}" class="space-y-6">
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Username *</span>
                </label>
                <input type="text" id="username" th:field="*{username}" class="input input-bordered" placeholder="Choose a username" required>
                <div class="text-error text-xs mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Full Name</span>
                </label>
                <input type="text" id="fullName" th:field="*{fullName}" class="input input-bordered" placeholder="Your full name">
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Email *</span>
                </label>
                <input type="email" id="email" th:field="*{email}" class="input input-bordered" placeholder="your@email.com" required>
                <div class="text-error text-xs mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Phone Number</span>
                </label>
                <input type="tel" id="phoneNumber" th:field="*{phoneNumber}" class="input input-bordered" placeholder="+1-555-0100">
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Password *</span>
                </label>
                <input type="password" id="password" th:field="*{password}" class="input input-bordered" placeholder="Min. 6 characters" required>
                <div class="text-error text-xs mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Confirm Password *</span>
                </label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="input input-bordered" placeholder="Repeat password" required>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-primary w-full"><i class="fas fa-user-plus"></i> Create Account</button>
        </form>
        <div class="mt-6 text-center">
            <p>Already have an account? <a th:href="@{/auth/login}" class="link link-primary">Sign in</a></p>
        </div>
    </div>
</body>

</body>
</html>
