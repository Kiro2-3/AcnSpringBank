<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange - NeoBank</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-layout">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-university"></i>
            <span>NeoBank</span>
        </div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/dashboard}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a th:href="@{/accounts}"><i class="fas fa-wallet"></i> Accounts</a></li>
            <li><a th:href="@{/transactions}"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
            <li class="active"><a th:href="@{/currency}"><i class="fas fa-coins"></i> Currency</a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <div>
                    <span class="user-display-name" th:text="${user.fullName != null ? user.fullName : user.username}">User</span>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout-sidebar"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Currency Exchange</h1>
                <p class="page-subtitle">Real-time currency rates and conversion</p>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div class="currency-grid">
            <!-- Live Converter -->
            <div class="neu-card converter-card">
                <div class="card-header">
                    <h2><i class="fas fa-calculator"></i> Currency Converter</h2>
                    <span class="live-badge"><i class="fas fa-circle"></i> Live</span>
                </div>
                <div class="converter-form">
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="convertAmount" step="0.01" min="0.01"
                               class="form-control neu-input" placeholder="Enter amount" value="1">
                    </div>
                    <div class="converter-row">
                        <div class="form-group">
                            <label>From</label>
                            <select id="fromCurrency" class="form-control neu-select">
                                <option th:each="curr : ${currencies}"
                                        th:value="${curr}"
                                        th:text="${curr}"
                                        th:selected="${curr == 'USD'}">USD</option>
                            </select>
                        </div>
                        <button type="button" class="swap-btn" onclick="swapCurrencies()">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                        <div class="form-group">
                            <label>To</label>
                            <select id="toCurrency" class="form-control neu-select">
                                <option th:each="curr : ${currencies}"
                                        th:value="${curr}"
                                        th:text="${curr}"
                                        th:selected="${curr == 'EUR'}">EUR</option>
                            </select>
                        </div>
                    </div>
                    <button type="button" class="btn-primary btn-full" onclick="convertCurrency()">
                        <i class="fas fa-sync-alt"></i> Convert
                    </button>
                    <div id="conversionResult" class="conversion-result" style="display:none;">
                        <div class="result-display">
                            <span id="resultAmount" class="result-value">0.00</span>
                            <span id="resultCurrency" class="result-currency">EUR</span>
                        </div>
                        <p id="rateInfo" class="rate-info"></p>
                    </div>
                </div>
            </div>

            <!-- Exchange Form -->
            <div class="neu-card exchange-form-card">
                <div class="card-header">
                    <h2><i class="fas fa-coins"></i> Exchange Between Accounts</h2>
                </div>
                <form th:action="@{/currency/exchange}" method="post"
                      th:object="${exchangeRequest}" class="modal-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label>Source Account (Debit)</label>
                        <select th:field="*{sourceAccountId}" class="form-control neu-select" required>
                            <option value="">-- Select Source --</option>
                            <option th:each="acc : ${accounts}"
                                    th:value="${acc.id}"
                                    th:text="${acc.accountNumber} + ' (' + ${acc.currency} + ') - ' + ${#numbers.formatDecimal(acc.balance, 1, 2)}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Destination Account (Credit)</label>
                        <select th:field="*{destinationAccountId}" class="form-control neu-select" required>
                            <option value="">-- Select Destination --</option>
                            <option th:each="acc : ${accounts}"
                                    th:value="${acc.id}"
                                    th:text="${acc.accountNumber} + ' (' + ${acc.currency} + ') - ' + ${#numbers.formatDecimal(acc.balance, 1, 2)}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>From Currency</label>
                        <select th:field="*{fromCurrency}" class="form-control neu-select" required>
                            <option th:each="curr : ${currencies}" th:value="${curr}" th:text="${curr}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>To Currency</label>
                        <select th:field="*{toCurrency}" class="form-control neu-select" required>
                            <option th:each="curr : ${currencies}" th:value="${curr}" th:text="${curr}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount to Exchange</label>
                        <input type="number" th:field="*{amount}" step="0.01" min="0.01"
                               class="form-control neu-input" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full">
                        <i class="fas fa-coins"></i> Exchange Currency
                    </button>
                </form>
            </div>
        </div>

        <!-- Exchange Rate Table -->
        <div class="neu-card rates-card">
            <div class="card-header">
                <h2><i class="fas fa-table"></i> Exchange Rates (Base: USD)</h2>
                <button class="btn-secondary btn-sm" onclick="refreshRates()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
            <div class="rates-grid" id="ratesGrid">
                <div th:each="entry : ${ratesFromUsd}" class="rate-card neu-mini-card">
                    <div class="rate-currency">
                        <span class="currency-code" th:text="${entry.key}">EUR</span>
                    </div>
                    <div class="rate-value">
                        <span th:text="${#numbers.formatDecimal(entry.value, 1, 4)}">0.9200</span>
                    </div>
                    <div class="rate-label">per USD</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/currency.js}"></script>
</body>
</html>
