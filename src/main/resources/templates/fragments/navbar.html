<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - Accenture' : 'Accenture - Online Banking'}">Accenture</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-base-100 shadow-lg" th:fragment="navbar">
    <div class="flex-1">
        <a class="btn btn-ghost normal-case text-xl text-primary"><i class="fas fa-university mr-2"></i>Accenture</a>
    </div>
    <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
            <li><a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active'" class="text-base-content"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a th:href="@{/accounts}" th:classappend="${activePage == 'accounts'} ? 'active'" class="text-base-content"><i class="fas fa-wallet"></i> Accounts</a></li>
            <li><a th:href="@{/transactions}" th:classappend="${activePage == 'transactions'} ? 'active'" class="text-base-content"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
            <li><a th:href="@{/currency}" th:classappend="${activePage == 'currency'} ? 'active'" class="text-base-content"><i class="fas fa-coins"></i> Currency</a></li>
        </ul>
        <div class="ml-4 flex items-center gap-2">
            <span class="user-name font-semibold text-base-content" sec:authentication="name">User</span>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-error btn-sm"><i class="fas fa-sign-out-alt"></i></button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
