<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<aside class="w-64 bg-neutral-900 shadow-xl rounded-2xl p-4 h-fit sticky top-8 self-start text-neutral-100" th:fragment="sidebar(activePage)">
    <div class="flex flex-col items-center mb-6">
        <i class="fas fa-university text-primary text-3xl mb-2"></i>
        <span class="font-bold text-xl text-primary">Accenture</span>
    </div>
    <div x-data="{ open: null }" class="space-y-2">
        <div>
            <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 1 ? open = null : open = 1">
                <i class="fas fa-tachometer-alt mr-3"></i>
                <span class="flex-1">Dashboard</span>
                <i class="fas fa-chevron-down transition-transform" :class="open === 1 ? 'rotate-180' : ''"></i>
            </button>
            <div x-show="open === 1" class="pl-8 py-1">
                <a th:href="@{/dashboard}" class="block py-1 hover:text-primary transition" th:classappend="${activePage} == 'dashboard' ? 'text-primary font-bold' : ''">Overview</a>
            </div>
        </div>
        <div>
            <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 2 ? open = null : open = 2">
                <i class="fas fa-wallet mr-3"></i>
                <span class="flex-1">Accounts</span>
                <i class="fas fa-chevron-down transition-transform" :class="open === 2 ? 'rotate-180' : ''"></i>
            </button>
            <div x-show="open === 2" class="pl-8 py-1">
                <a th:href="@{/accounts}" class="block py-1 hover:text-primary transition" th:classappend="${activePage} == 'accounts' ? 'text-primary font-bold' : ''">All Accounts</a>
                <a th:href="@{/accounts/settings}" class="block py-1 hover:text-primary transition" th:classappend="${activePage} == 'settings' ? 'text-primary font-bold' : ''">Settings</a>
            </div>
        </div>
        <div>
            <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 3 ? open = null : open = 3">
                <i class="fas fa-exchange-alt mr-3"></i>
                <span class="flex-1">Transactions</span>
                <i class="fas fa-chevron-down transition-transform" :class="open === 3 ? 'rotate-180' : ''"></i>
            </button>
            <div x-show="open === 3" class="pl-8 py-1">
                <a th:href="@{/transactions}" class="block py-1 hover:text-primary transition" th:classappend="${activePage} == 'transactions' ? 'text-primary font-bold' : ''">All Transactions</a>
            </div>
        </div>
        <div>
            <button class="flex items-center w-full px-3 py-2 rounded-lg hover:bg-neutral-800 transition" @click="open === 4 ? open = null : open = 4">
                <i class="fas fa-coins mr-3"></i>
                <span class="flex-1">Currency</span>
                <i class="fas fa-chevron-down transition-transform" :class="open === 4 ? 'rotate-180' : ''"></i>
            </button>
            <div x-show="open === 4" class="pl-8 py-1">
                <a th:href="@{/currency}" class="block py-1 hover:text-primary transition" th:classappend="${activePage} == 'currency' ? 'text-primary font-bold' : ''">Currency Exchange</a>
            </div>
        </div>
    </div>
    <div class="mt-8 flex flex-col items-center gap-2">
        <span class="font-medium text-neutral-200" th:text="${user.fullName != null ? user.fullName : user.username}">User</span>
        <form th:action="@{/auth/logout}" method="post" class="w-full">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-error btn-sm w-full mt-2"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </div>
</aside>
</html>
