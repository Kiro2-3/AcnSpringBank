<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<aside class="sidebar custom-sidebar items-center" th:fragment="sidebar(activePage)">
    <div class="flex flex-col items-center mb-6">
        <i class="fas fa-university text-primary text-3xl mb-2"></i>
    </div>
    <ul class="menu menu-vertical items-center w-auto px-0">
        <li>
            <a th:href="@{/dashboard}" th:classappend="${activePage} == 'dashboard' ? 'active' : ''" class="text-base-content flex flex-col items-center justify-center tooltip" data-tip="Dashboard">
                <i class="fas fa-tachometer-alt text-2xl"></i>
            </a>
        </li>
        <li>
            <a th:href="@{/accounts}" th:classappend="${activePage} == 'accounts' ? 'active' : ''" class="text-base-content flex flex-col items-center justify-center tooltip" data-tip="Accounts">
                <i class="fas fa-wallet text-2xl"></i>
            </a>
        </li>
        <li>
            <a th:href="@{/transactions}" th:classappend="${activePage} == 'transactions' ? 'active' : ''" class="text-base-content flex flex-col items-center justify-center tooltip" data-tip="Transactions">
                <i class="fas fa-exchange-alt text-2xl"></i>
            </a>
        </li>
            <li>
                <a th:href="@{/transactions/history}" th:classappend="${activePage} == 'transactions-history' ? 'active' : ''" class="text-base-content flex flex-col items-center justify-center tooltip" data-tip="Transactions History">
                    <i class="fas fa-history text-2xl"></i>
                </a>
            </li>
        <li>
            <a th:href="@{/currency}" th:classappend="${activePage} == 'currency' ? 'active' : ''" class="text-base-content flex flex-col items-center justify-center tooltip" data-tip="Currency">
                <i class="fas fa-coins text-2xl"></i>
            </a>
        </li>
        <li>
            <a th:href="@{/accounts/settings}" th:classappend="${activePage} == 'settings' ? 'active' : ''" class="text-base-content flex flex-col items-center justify-center tooltip" data-tip="Settings">
                <i class="fas fa-cog text-2xl"></i>
            </a>
        </li>
    </ul>
    <div class="mt-8 flex flex-col items-center gap-2">
        <form th:action="@{/auth/logout}" method="post" class="w-full flex flex-col items-center">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-error btn-sm w-10 h-10 flex items-center justify-center tooltip" data-tip="Logout"><i class="fas fa-sign-out-alt text-xl"></i></button>
        </form>
    </div>
</aside>
</html>
