<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<aside class="sidebar custom-sidebar" th:fragment="sidebar(activePage)">
    <div class="flex flex-col items-center mb-6">
        <i class="fas fa-university text-primary text-3xl mb-2"></i>
        <span class="font-bold text-xl text-primary">Accenture</span>
    </div>
    <ul class="menu menu-vertical w-full px-1">
        <li>
            <a th:href="@{/dashboard}" th:classappend="${activePage} == 'dashboard' ? 'active' : ''" class="text-base-content flex items-center">
                <i class="fas fa-tachometer-alt mr-2"></i> Dashboard
            </a>
        </li>
        <li>
            <a th:href="@{/accounts}" th:classappend="${activePage} == 'accounts' ? 'active' : ''" class="text-base-content flex items-center">
                <i class="fas fa-wallet mr-2"></i> Accounts
            </a>
        </li>
        <li>
            <a th:href="@{/transactions}" th:classappend="${activePage} == 'transactions' ? 'active' : ''" class="text-base-content flex items-center">
                <i class="fas fa-exchange-alt mr-2"></i> Transactions
            </a>
        </li>
        <li>
            <a th:href="@{/currency}" th:classappend="${activePage} == 'currency' ? 'active' : ''" class="text-base-content flex items-center">
                <i class="fas fa-coins mr-2"></i> Currency
            </a>
        </li>
        <li>
            <a th:href="@{/accounts/settings}" th:classappend="${activePage} == 'settings' ? 'active' : ''" class="text-base-content flex items-center pl-8">
                <i class="fas fa-cog mr-2"></i> Settings
            </a>
        </li>
    </ul>
    <div class="mt-8 flex flex-col items-center gap-2">
        <span class="user-name font-semibold text-base-content" th:text="${user.fullName != null ? user.fullName : user.username}">User</span>
        <form th:action="@{/auth/logout}" method="post" class="w-full">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-error btn-sm w-full mt-2"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </div>
</aside>
</html>
